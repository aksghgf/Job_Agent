name: Job Application Agent

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # manual trigger button too

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Restore resume
        run: |
          echo "${{ secrets.RESUME_BASE64 }}" | base64 -d > resume.pdf

      - name: Restore Telegram session
        run: |
          echo "${{ secrets.TELEGRAM_SESSION }}" | base64 -d > job_agent_session.session

      - name: Create .env
        run: |
          echo "TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}" >> .env
          echo "TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}" >> .env
          echo "TELEGRAM_PHONE=${{ secrets.TELEGRAM_PHONE }}" >> .env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}" >> .env
          echo "RESUME_PATH=resume.pdf" >> .env
          echo "CI=true" >> .env

      - name: Run agent
        run: python main.py

      - name: Save applications log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: applications-log
          path: applications_log.json